<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Mushroom monogram: a cream toadstool cradled in an amber "C" (cytonicmushroom),
       with a cyan spore-dot for the Delver accent. One mark across every domain. -->
  <rect width="32" height="32" rx="7" fill="#0e1217"/>
  <path d="M23 9.7 A9.5 9.5 0 1 0 23 22.3" fill="none" stroke="#d7a13b" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M10.5 16 C10.5 9.8 21.5 9.8 21.5 16 Z" fill="#efe6d3"/>
  <path d="M13.8 16 h3.6 v4 a1.8 1.8 0 0 1 -3.6 0 z" fill="#efe6d3"/>
  <circle cx="17.6" cy="12.8" r="1.3" fill="#6fd6e0"/>
</svg>
