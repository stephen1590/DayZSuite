# DayZ mod registry — THE single place to enable/disable/reorder server mods.
#
#   Format:  <@folder>  <workshop-id>  [optional]
#   - LINE ORDER = LOAD ORDER (frameworks first; dependents after their dependencies).
#   - Comment a line out (#) to disable it EVERYWHERE: unit -mod line, downloads, sync.
#     Re-enable = remove the #, then ./Deploy-DayZServer.ps1 -Fix (drift does the rest).
#   - 'optional' = best-effort download/sync (delisted items); never blocks the run.
#   - Inline comments after the fields are fine; 'optional' must come before any '#'.
#
# Consumed by:
#   update.sh              downloads every enabled id, syncs to <@folder>, copies bikeys
#   Deploy-DayZServer.ps1  renders the unit's -mod line ({{DEPLOY_MODLINE}}) from the
#                          enabled lines IN ORDER, and auto-runs update.sh when an
#                          enabled @folder is missing on the box.
# Disabled mods keep their @folder on disk (harmless); only the reference is dropped.

