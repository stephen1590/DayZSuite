# Personal Projects — a static-ish Hugo site (Delver-themed hugo-book).
# Portable: relativeURLs makes internal links page-relative so the site works on
# any host, under a subpath, or opened straight from disk. If you later settle on
# a domain, set baseURL to it and drop relativeURLs for cleaner canonical/RSS.
baseURL = '/'
relativeURLs = true
languageCode = 'en-us'
title = 'Personal Projects'
theme = 'hugo-book'

# hugo-book builds the left sidebar automatically from content/docs/**.
disablePathToLower = true
enableGitInfo = false

[params]
  # Custom Delver palette (light + dark) — defined in assets/_custom.scss.
  # The dark variant is the "nowhere"; it engages on prefers-color-scheme: dark.
  BookTheme = 'delver'
  BookSection = 'docs'
  BookToC = true
  BookSearch = true
  BookServiceWorker = false   # no PWA cache — simpler, and plays nice with relative URLs
  BookFavicon = 'images/favicon.svg'

[markup]
  [markup.goldmark.renderer]
    unsafe = true             # allow raw HTML in markdown (needed by some shortcodes)
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
  [markup.highlight]
    style = 'base16-snazzy'   # dark code theme, reads well on the Delver ground
    noClasses = true

# --- Mounts -----------------------------------------------------------------
# Declaring ANY content mount replaces Hugo's default one, so ./content is
# re-declared explicitly first - drop that line and the whole site disappears.
#
# The second mount grafts the StarDZ modding wiki (git submodule under external/,
# pinned to a reviewed commit) in ONE node below our own docs. Only en/ is mounted:
# the repo carries 12 languages and ~44 MB of assets, and rendering the other 11
# would bury our own pages in their own sidebar. The submodule is a BUILD-time
# dependency only - Deploy-Site ships ./public, so the box never sees the source.
[module]
  [[module.mounts]]
    source = 'content'
    target = 'content'
  [[module.mounts]]
    source = 'external/DayZ-Modding-Wiki/en'
    target = 'content/docs/reference/dayz-modding-wiki'
    # index.md is VitePress's landing page (layout: home - meaningless here), and in Hugo an
    # index.md makes the directory a LEAF BUNDLE, which swallows every file below it as a page
    # resource instead of a page. Left in, the whole 105-chapter wiki renders as ONE page.
    # Excluding it lets our own _index.md be the branch index, with the chapters as children.
    excludeFiles = ['index.md']
